# .github/workflows/add-company.yml
#
# 企業実績の表示追加を Claude Code で自動化するワークフロー
#
# 使い方:
#   1. GitHub の Actions タブ → "Add Company Display" → "Run workflow"
#   2. 企業名と企業IDを入力して実行
#   3. Claude Code が HTML/CSS を修正して PR を作成
#   4. Slack に完了通知が届く

name: Add Company Display

on:
  workflow_dispatch:
    inputs:
      company_name:
        description: "企業名（例: サンプル株式会社）"
        required: true
        type: string
      company_id:
        description: "企業ID（例: 12345）"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  add-company:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            index.html の <body> 内の末尾に、以下のHTMLを追加してください。

            <div class="company" id="company-12345">
              <h2>hoge</h2>
              <p>企業ID: 12345</p>
            </div>

            変更をブランチ `add-company-12345` にコミットしてプッシュし、
            gh コマンドで main に対する PR を作成してください。

          claude_args: "--max-turns 20"

      - name: Notify Slack on success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"✅ *${{ inputs.company_name }}*（ID: ${{ inputs.company_id }}）の実績表示追加PRを作成しました！\nGitHubでレビュー＆マージをお願いします 🙏\"
            }" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"❌ *${{ inputs.company_name }}*（ID: ${{ inputs.company_id }}）の実績表示追加に失敗しました。\nGitHub Actions のログを確認してください。\"
            }" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
